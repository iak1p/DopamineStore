<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="font-[Manrope]">
        <main class="py-3 px-3 flex flex-col gap-16 items-center">
            <p class="font-bold">Dopamine.</p>

            <div
                class="w-[90%] sm:w-[80%] inset-0 z-50 items-center justify-center flex"
            >
                <div
                    class="relative z-10 bg-[#F5F5F5] w-[90%] sm:w-[80%] max-w-lg rounded-xl px-6 py-6 shadow-xl"
                >
                    <p class="text-2xl sm:text-4xl font-semibold mb-4">
                        Continue Your
                        <span class="text-[#2B662D]">Premium</span>
                        <br />Experience
                    </p>

                    <form class="flex flex-col gap-3">
                        <div class="flex flex-col gap-1">
                            <label
                                for="username"
                                class="block mb-1 text-sm font-medium"
                            >
                                Username
                            </label>
                            <input
                                class="border border-[#D9D9D9] p-2 rounded-xl"
                                type="text"
                                placeholder="Username"
                                id="username"
                                name="username"
                            />
                        </div>
                        <div class="flex flex-col gap-1">
                            <label
                                for="password"
                                class="block mb-1 text-sm font-medium"
                            >
                                Password
                            </label>
                            <input
                                class="border border-[#D9D9D9] p-2 rounded-xl"
                                type="text"
                                placeholder="Password"
                                id="password"
                                name="password"
                            />
                        </div>
                        <p class="text-sm text-gray-600">
                            Don’t have an account?
                            <a
                                href="./register.html"
                                class="font-medium text-[#2B662D] hover:underline"
                            >
                                Create one
                            </a>
                        </p>
                        <button
                            class="bg-[#2B662D] text-white py-3 rounded-lg mt-2 cursor-pointer"
                        >
                            Access your account
                        </button>
                    </form>
                </div>
            </div>

            <p class="text-sm text-gray-600">
                Changed your mind?
                <a
                    href="./shop.html"
                    class="font-medium text-[#2B662D] hover:underline"
                >
                    Go back
                </a>
            </p>
        </main>
    </body>
</html>
