<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Document</title>
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap"
            rel="stylesheet"
        />
    </head>
    <body class="font-[Manrope]">
        <header class="container mx-auto py-3 px-3">
            <div
                class="sm:flex sm:justify-between sm:items-center flex-row gap-3"
            >
                <div class="flex items-center gap-10">
                    <div class="">
                        <p class="font-bold">Dopamine.</p>
                    </div>

                    <ul class="flex gap-3">
                        <li class="py-5 text-sm">
                            <a
                                href="/phase1/templates/shop.html"
                                aria-current="page"
                                class="aria-[current=page]:underline"
                            >
                                Shop
                            </a>
                        </li>
                    </ul>
                </div>

                <input
                    type="text"
                    class="border border-[#D9D9D9] rounded-xl px-3 py-5 w-full text-sm"
                    placeholder="Search for products"
                    id="search"
                    name="search"
                />

                <div class="flex items-center gap-3">
                    <button
                        class="w-full sm:w-auto bg-[#F5F5F5] text-sm px-8 py-5 rounded-xl"
                    >
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 16 16"
                            fill="currentColor"
                            class="size-4"
                        >
                            <path
                                d="M8 8a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM12.735 14c.618 0 1.093-.561.872-1.139a6.002 6.002 0 0 0-11.215 0c-.22.578.254 1.139.872 1.139h9.47Z"
                            />
                        </svg>
                    </button>

                    <button
                        onclick="
                            window.location.href =
                                '/phase1/templates/assets/components/cart.html'
                        "
                        class="w-full sm:w-auto bg-[#2B662D] text-sm px-8 py-5 rounded-xl"
                    >
                        <a
                            href="/phase1/templates/assets/components/cart.html"
                        ></a>
                        <svg
                            xmlns="http://www.w3.org/2000/svg"
                            viewBox="0 0 16 16"
                            fill="white"
                            class="size-4"
                        >
                            <path
                                d="M1.75 1.002a.75.75 0 1 0 0 1.5h1.835l1.24 5.113A3.752 3.752 0 0 0 2 11.25c0 .414.336.75.75.75h10.5a.75.75 0 0 0 0-1.5H3.628A2.25 2.25 0 0 1 5.75 9h6.5a.75.75 0 0 0 .73-.578l.846-3.595a.75.75 0 0 0-.578-.906 44.118 44.118 0 0 0-7.996-.91l-.348-1.436a.75.75 0 0 0-.73-.573H1.75ZM5 14a1 1 0 1 1-2 0 1 1 0 0 1 2 0ZM13 14a1 1 0 1 1-2 0 1 1 0 0 1 2 0Z"
                            />
                        </svg>
                    </button>
                </div>
            </div>
        </header>
        <main class="container mx-auto px-3 pb-14">
            <h1 class="mt-8 text-3xl font-semibold tracking-tight">
                Create a new product
            </h1>
            <p class="mt-2 text-sm text-[#666]">
                The product must contain at least <b>title</b>,
                <b>description</b>, <b>at least 2 photos</b>.
            </p>

            <div class="mt-8 rounded-2xl border border-[#EFEFEF] bg-white p-6">
                <form
                    id="productForm"
                    class="grid grid-cols-1 gap-10 lg:grid-cols-2"
                >
                    <div>
                        <label class="block">
                            <span class="text-sm font-semibold text-[#555]"
                                >Title *</span
                            >
                            <input
                                id="title"
                                required
                                class="mt-2 w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                placeholder="Peach.."
                            />
                        </label>

                        <label class="mt-6 block">
                            <span class="text-sm font-semibold text-[#555]"
                                >Description *</span
                            >
                            <textarea
                                id="description"
                                required
                                class="mt-2 min-h-[200px] w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                placeholder="Product description…"
                            ></textarea>
                        </label>

                        <div class="mt-6 grid grid-cols-1 gap-3 sm:grid-cols-2">
                            <label class="block">
                                <span class="text-sm font-semibold text-[#555]"
                                    >Price (€)</span
                                >
                                <input
                                    type="number"
                                    step="0.01"
                                    min="0"
                                    class="mt-2 w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                    placeholder="3.90"
                                />
                            </label>

                            <label class="block">
                                <span class="text-sm font-semibold text-[#555]"
                                    >Category</span
                                >
                                <select
                                    class="mt-2 w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                >
                                    <option>Stone fruits</option>
                                    <option>Citrus fruits</option>
                                    <option>Exotic fruits</option>
                                    <option>Pome fruits</option>
                                    <option>Boxes</option>
                                </select>
                            </label>
                        </div>

                        <div class="mt-6 grid grid-cols-1 gap-3 sm:grid-cols-2">
                            <label class="block">
                                <span class="text-sm font-semibold text-[#555]"
                                    >Quantity</span
                                >
                                <input
                                    type="number"
                                    min="0"
                                    class="mt-2 w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                    placeholder="12"
                                />
                            </label>

                            <label class="block">
                                <span class="text-sm font-semibold text-[#555]"
                                    >Unit</span
                                >
                                <select
                                    class="mt-2 w-full rounded-md border border-[#D9D9D9] px-3 py-3 text-sm"
                                >
                                    <option>kg</option>
                                    <option>box</option>
                                </select>
                            </label>
                        </div>
                    </div>

                    <div>
                        <label class="block">
                            <span class="text-sm font-semibold text-[#555]"
                                >Photos * (at least 2)</span
                            >
                            <input
                                id="photos"
                                type="file"
                                accept="image/*"
                                multiple
                                class="mt-2 block w-full text-sm file:mr-4 file:rounded-full file:border-0 file:bg-[#2B662D] file:px-5 file:py-2 file:font-semibold file:text-white hover:file:opacity-95"
                            />
                            <p
                                id="photosHint"
                                class="mt-2 text-xs text-[#8A8A8A]"
                            >
                                Select at least 2 images.
                            </p>
                        </label>

                        <div
                            id="preview"
                            class="mt-6 grid grid-cols-2 gap-3 sm:grid-cols-3"
                        ></div>

                        <div
                            class="mt-10 flex flex-col gap-3 sm:flex-row sm:justify-end"
                        >
                            <button
                                type="reset"
                                class="rounded-full border border-[#CFCFCF] px-6 py-3 font-semibold text-[#444]"
                            >
                                Cancel
                            </button>

                            <button
                                type="submit"
                                class="rounded-full bg-[#2B662D] px-6 py-3 font-semibold text-white"
                            >
                                Save product
                            </button>
                        </div>

                        <p id="formMsg" class="mt-4 text-sm"></p>
                    </div>
                </form>
            </div>
        </main>
    </body>
</html>
